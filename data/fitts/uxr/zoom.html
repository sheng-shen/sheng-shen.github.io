<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoom</title>
    <link rel="stylesheet" href="style_dc.css">
    <script type="text/javascript" src="scripts_dc.js"></script>
    <script type="text/javascript" src="zoom.js"></script>
</head>

<body oncontextmenu="return false;">
    <div id="zoom-body" style="display: none;">
        <div id="text-top-left" class="text-top-left" style="display: none;"></div>
        <div id="container-outline" class="container-outline"></div>
        <div class="zoom-target-outline" id="zoom-target-outline-outer"></div>
        <div class="zoom-target-outline" id="zoom-target-outline-inner"></div>
        <div class="zoom-inner-square" id="zoom-inner-square"></div>
    </div>

    <div class="start-screen" id="start-screen">
        <div class="start-controls">
            <div class="button-pad">
                <input type="text" id="button-pad-id" placeholder="ID #" disabled>
                <div class="row">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>
                <div class="row">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>
                <div class="row">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>
                <div class="row">
                    <button class="hidden-button">H</button>
                    <button>0</button>
                    <button>C</button>
                </div>
            </div>
        </div>
        <div class="start-controls">
            <p id="start-title" style="display: none;"></p>
            <p id="start-explanation" style="display: none;"></p>
            <button id="start-button" onclick="startZoomExperience()">Start</button>
        </div>

        <div class="start-controls">
            <p id="start-text" style="font-size: 1.5rem"></p>
        </div>
    </div>

    <form
        action="https://docs.google.com/forms/d/e/1FAIpQLSe6mOlNanAGhAGk0rBPo7uxu3884_7PKt3nnnQmJG1ReqftFQ/formResponse"
        target="_self" id="bootstrapForm" method="POST" style="display:none;">

        <input id="device_os" type="text" name="entry.1366025332">
        <input id="device_browser" type="text" name="entry.1979876681">
        <input id="participant_id" type="text" name="entry.1761654424">
        <input id="trial_num" type="text" name="entry.1116494097">
        <input id="time_to_complete" type="text" name="entry.1300493740">
        <input id="gesture_count" type="text" name="entry.1840365285">
        <input id="session_id" type="text" name="entry.877942014">
        <input type="hidden" name="fvv" value="1">
        <input type="hidden" name="fbzx" value="3370711476967520141">
        <input type="hidden" name="pageHistory" value="0">

        <input class="btn btn-primary" type="submit" value="Submit">
    </form>

    <script type="text/javascript">
        const EXPERIENCE_NAME = "Zoom";
        const EXPLANATION = 'Pinch to zoom until the blue square matches the purple outline.';
        setExperienceTitle(EXPERIENCE_NAME, EXPLANATION);
    </script>
</body>

</html>
